services:
  - type: web
    name: django-backend
    env: docker
    dockerfilePath: dockerfile
    autoDeploy: true
    plan: starter
    startCommand: >
      bash -lc "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --log-level info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: PYTHONUNBUFFERED
        value: "1"
